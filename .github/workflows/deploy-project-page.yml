name: Deploy DeformGen project page

on:
  push:
    branches: [project-page]
    paths:
      - "index.html"
      - "static/**"
      - ".github/workflows/deploy-project-page.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.GH_PAT }}
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -a static _site/static
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
