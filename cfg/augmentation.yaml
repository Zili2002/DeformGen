defaults:
  - env: xarm_gripper
  - gs: rope
  - physics: default
  - _self_

hydra:
  output_subdir: null
  run:
    dir: .

seed: 0

env_config: xarm_gripper
gs_config: rope

# Demo source
demo:
  gt_dir: log/policy_rollouts/rope_act_7000
  episode_id: 1

# Planar perturbation config (policy space: 0=open, 1=closed)
perturbation:
  mode: teleop_random  # fixed | teleop_random
  random_steps: 180
  translation_step_sizes: [0.012, 0.006, 0.003]
  rotation_step_deg: 6.0
  rotation_prob: 0.45
  translation_range_xy: [-10.0, 10.0]
  rotation_range_z: [-15.0, 15.0]
  num_waypoints: 40
  gripper_state: 1.0
  min_translation_norm: 0.1
  min_rotation_abs: 10.0

# Batch config
batch:
  num_samples: 10
  seed: 1600
  parallel: false

# Release (open gripper after perturbation)
release:
  enabled: true
  num_waypoints: 12
  gripper_open: 0.0

# Replay initialization
replay_init:
  enabled: true
  frame: index  # grasp | start | index
  index: 120
  stabilization_steps: 30
  run_demo_tail: true

# Output config
output:
  root_dir: log/augmented_dataset
  overwrite: false
  save_soft_body_state: true
  save_robot_state: true
  save_rgb_images: true
  save_metadata: true
  save_trajectory: true
  replay_output_root: null
  final_state_stabilization_steps: 40

# Replay behavior
replay_randomize: false
reset_seed: 1

# Case-aware runtime-random defaults copied from the original three-case
# perturbation plan. The DeformGen CLI reads these profiles automatically;
# direct Hydra users retain the rope baseline values declared above.
case_defaults:
  rope:
    replay_randomize: true
    demo:
      gt_dir: log/policy_rollouts/rope_act_7000
      episode_id: 1
    seed:
      base: 1600
      stride: 1
      reset: 1
    perturbation:
      random_steps: 180
      translation_step_sizes: [0.012, 0.006, 0.003]
      rotation_step_deg: 6.0
      rotation_prob: 0.45
    release:
      enabled: true
      num_waypoints: 12
      gripper_open: 0.0
    replay_init:
      index: 120
      stabilization_steps: 30
      run_demo_tail: true
    output:
      final_state_stabilization_steps: 40
  sloth:
    replay_randomize: false
    demo:
      gt_dir: log/dataset/teleop_replay_005_sloth_grasp_shift_s5a3f2_segmentxy_keepoffset
      episode_id: 0
    seed:
      base: 42
      stride: 1
      reset: null
    perturbation:
      random_steps: 180
      translation_step_sizes: [0.012, 0.006, 0.003]
      rotation_step_deg: 6.0
      rotation_prob: 0.45
    release:
      enabled: true
      num_waypoints: 12
      gripper_open: 0.0
    replay_init:
      index: 100
      stabilization_steps: 30
      run_demo_tail: false
    output:
      final_state_stabilization_steps: 40
  cloth3:
    replay_randomize: false
    demo:
      gt_dir: log/dataset/teleop_run_007_clean_noleading_interp80_trim_norelease
      episode_id: 0
    seed:
      base: 44
      stride: 1000
      reset: null
    perturbation:
      random_steps: 260
      translation_step_sizes: [0.018, 0.009, 0.0045]
      rotation_step_deg: 8.0
      rotation_prob: 0.55
    release:
      enabled: false
      num_waypoints: 12
      gripper_open: 0.0
    replay_init:
      index: 65
      stabilization_steps: 30
      run_demo_tail: false
    output:
      final_state_stabilization_steps: 40

# default-state/configured-grid/uniform-grid synthesize a reset state rather
# than a runtime perturbation, so they retain the original 30-step stabilization.
state_synthesis:
  final_state_stabilization_steps: 30

# Original full pipeline exports replay videos by default.
make_videos: true

# Optional fixed initial soft-body state for perturbation synthesis replay reset.
# Path should point to a world-frame state.npy that can be loaded via
# replay.py +deformed_state_path=...
initial_deformed_state_path: null
